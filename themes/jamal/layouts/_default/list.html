{{ define "main" }}
<div class="max-w-screen-2xl mx-auto px-8 py-16">
    <h1 class="font-display text-6xl tracking-tighter mb-6">{{ .Title }}</h1>
    <div class="prose-custom text-gray-600 dark:text-gray-300">{{ .Content }}</div>
    <div class="mt-12 space-y-4">
        {{ range .Pages }}
        <a href="{{ .RelPermalink }}" class="block card sharp p-6 hover:underline">
            <h3 class="font-semibold text-xl">{{ .Title }}</h3>
            {{ with .Description }}<p class="mt-2 text-sm text-gray-500">{{ . }}</p>{{ end }}
        </a>
        {{ end }}
    </div>
</div>
{{ end }}
